name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: self-hosted
    env:
      DOCKER_HOST: tcp://docker1.lab50:2375
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t 1cedo .

      - name: Run tests
        run: docker run --rm 1cedo python3 manage.py test

      - name: Deploy
        run: |
          docker rm -f 1cedo || true
          docker run -d --name 1cedo \
            --restart unless-stopped \
            --network default \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.1cedo.rule=Host(\`1cedo.docker1.lab50\`)" \
            --label "traefik.docker.network=traefik_network" \
            1cedo
          docker network connect traefik_network 1cedo
